<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spenze — Privacy Policy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f7f8fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      display: inline-block;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .logo img {
      width: 72px;
      height: 72px;
      display: block;
    }
    h1 { font-size: 1.6rem; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 0.95rem; margin-bottom: 36px; }
    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-bottom: 12px;
    }
    .buttons { display: flex; flex-direction: column; gap: 12px; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-pt {
      background: #f0faf5;
      color: #007A55;
      border: 1.5px solid #c3e8d8;
    }
    .btn-pt:hover { background: #e0f5ec; }
    .btn-en {
      background: #007A55;
      color: #fff;
    }
    .btn-en:hover { background: #005c40; }
    .btn-label { display: flex; align-items: center; gap: 10px; }
    .flag { font-size: 1.3rem; }
    .arrow { font-size: 1rem; opacity: 0.6; }
    .divider { height: 1px; background: #f0f0f0; margin: 28px 0; }
    .btn-del {
      background: #fff5f5;
      color: #c0392b;
      border: 1.5px solid #f5c6c6;
    }
    .btn-del:hover { background: #fee; }
    .back { font-size: 0.85rem; color: #aaa; }
    .back a { color: #007A55; text-decoration: none; }
    .back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="icon.png" alt="Spenze" /></div>
    <h1>Spenze</h1>
    <p class="subtitle">Personal Finance — Smart &amp; Simple</p>

    <p class="section-title">Privacy Policy · Política de Privacidade</p>

    <div class="buttons">
      <a href="privacy-policy-en-US.html" class="btn btn-en">
        <span class="btn-label">
          <span class="flag">🇺🇸</span>
          Privacy Policy (English)
        </span>
        <span class="arrow">→</span>
      </a>
      <a href="privacy-policy-pt-BR.html" class="btn btn-pt">
        <span class="btn-label">
          <span class="flag">🇧🇷</span>
          Política de Privacidade (Português)
        </span>
        <span class="arrow">→</span>
      </a>
      <a href="data-deletion.html" class="btn btn-del">
        <span class="btn-label">
          <span class="flag">🗑️</span>
          Data Deletion / Exclusão de dados
        </span>
        <span class="arrow">→</span>
      </a>
    </div>

    <div class="divider"></div>
    <p class="back">
      <a href="../">← mehnic-legal</a> &nbsp;·&nbsp;
      &copy; 2026 <a href="../">Mehnic</a>
    </p>
  </div>
</body>
</html>
